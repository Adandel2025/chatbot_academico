<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar contenido</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:40px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

textarea{
resize:vertical;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
background:#007BFF;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.volver{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#555;
}

.volver:hover{
text-decoration:underline;
}

</style>

</head>
<body>

<div class="container">

<h2>Editar contenido</h2>

<form method="POST">

<label>Tema</label>
<input type="text" name="tema" value="{{contenido.tema}}" required>

<label>Subtema</label>
<input type="text" name="subtema" value="{{contenido.subtema}}" required>

<label>Contenido</label>
<textarea name="contenido" rows="6" required>{{contenido.contenido}}</textarea>

<label>Referencias</label>
<textarea name="referencias" rows="4">{{contenido.referencias}}</textarea>

<button type="submit">Guardar cambios</button>

</form>

<a class="volver" href="/admin/dashboard">← Volver al panel</a>

</div>

</body>
</html>
