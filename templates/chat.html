<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Chatbot Academico</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <style>

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0d1117;
      background: url('/static/img/fondo.jpg') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
      color: #dce7f0;
    }

    
    .filtro {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(9px);
      z-index: -1;
    }


    .container {
      max-width: 800px;
      margin: 45px auto;
      padding: 35px;
      background: rgba(18, 22, 30, 0.78);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 0 26px rgba(0,0,0,0.6);
      backdrop-filter: blur(14px);
    }

    h2 {
      margin-top: 0;
      text-align: center;
      color: #2196f3;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(33,150,243,0.4);
    }

    
    #chat {
      height: 420px;
      overflow:auto;
      border:1px solid rgba(255,255,255,0.08);
      padding:16px;
      border-radius:12px;
      background: rgba(15,17,22,0.75);
      color:white;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.35);
    }


    .msg {
      margin:10px 0;
      padding:13px 18px;
      border-radius:12px;
      display:inline-block;
      max-width:92%;
      white-space:pre-wrap;
      line-height:1.45;
      font-size: 15px;
      animation: fadeIn 0.22s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }


    .user {
      background: #1e3a5f;
      color: white;
      margin-left: auto;
      display: block;
      border: 1px solid rgba(33,150,243,0.4);
      box-shadow: 0 0 10px rgba(33,150,243,0.25);
    }

    
    .bot {
      background: rgba(30, 34, 44, 0.88);
      color: #e8eef5;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 12px rgba(0,0,0,0.45);
    }

    
    .input-row {
      display:flex;
      gap:12px;
      margin-top:18px;
    }

    textarea {
      flex:1;
      padding:13px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.45);
      color:#e3edf8;
      font-size:15px;
      resize:none;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.35);
    }

    textarea::placeholder {
      color:#9bb3c9;
    }

    button {
      padding:12px 18px;
      border:none;
      background:#2196f3;
      color:white;
      font-weight:bold;
      border-radius:10px;
      cursor:pointer;
      transition: 0.25s;
      box-shadow: 0 0 14px rgba(33,150,243,0.35);
    }

    button:hover {
      background:#1976d2;
      box-shadow: 0 0 20px rgba(33,150,243,0.55);
    }

    .admin-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #2196f3;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 14px rgba(33,150,243,0.45);
      z-index: 9999;
      transition: 0.25s;
    }

    .admin-btn:hover {
      background: #1976d2;
      box-shadow: 0 0 22px rgba(33,150,243,0.75);
    }

  </style>
</head>

<body>

  <div class="filtro"></div>

  <a href="/admin" class="admin-btn">Panel Admin</a>

  <div class="container">
    <h2>Chatbot Académico</h2>
    <div id="chat"></div>

    <div class="input-row">
      <textarea id="msg" rows="2" placeholder="Escribe tu mensaje aquí..."></textarea>
      <button id="send">Enviar</button>
    </div>
  </div>

<script>
const chat = document.getElementById('chat');
const msg = document.getElementById('msg');
const send = document.getElementById('send');

function addMessage(text, cls){
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.innerText = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function enviar(text){
  const resp = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message:text})
  });

  let j = null;
  try {
    j = await resp.json();
  } catch(err){
    addMessage("Error: respuesta inválida del servidor", "bot");
    return;
  }

  if(j.ok){
    addMessage(j.response, 'bot');
  } else {
    addMessage("Error: " + (j.message || "no response"), "bot");
  }
}

send.addEventListener('click', async ()=>{
  const text = msg.value.trim();
  if(!text) return;

  addMessage(text, 'user');
  msg.value = '';
  await enviar(text);
});

msg.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    send.click();
  }
});

let firstLoad = true;

window.onload = async () => {
  if(!firstLoad) return;
  firstLoad = false;

  await enviar("hola");
};
</script>

</body>
</html>
